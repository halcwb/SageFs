name: Build tree-sitter-fsharp natives

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/tree-sitter-natives.yml'

jobs:
  build-native:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
            lib: libtree-sitter-fsharp.so
            cc_flags: ""
          - os: ubuntu-24.04-arm
            rid: linux-arm64
            lib: libtree-sitter-fsharp.so
            cc_flags: ""
          - os: macos-latest
            rid: osx-arm64
            lib: libtree-sitter-fsharp.dylib
            cc_flags: ""
          - os: macos-latest
            rid: osx-x64
            lib: libtree-sitter-fsharp.dylib
            cc_flags: "-arch x86_64"

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v5

    - name: Clone ionide/tree-sitter-fsharp
      run: git clone --depth 1 https://github.com/ionide/tree-sitter-fsharp.git ts-fsharp

    - name: Build shared library
      working-directory: ts-fsharp
      run: |
        # Pre-generated parser.c files from ionide/tree-sitter-fsharp — compile directly
        SOURCES=$(find fsharp/src fsharp_signature/src -name '*.c')
        echo "Compiling: $SOURCES"
        cc -shared -fPIC ${{ matrix.cc_flags }} -o ${{ matrix.lib }} $SOURCES -Ifsharp/src -Ifsharp_signature/src
        ls -la ${{ matrix.lib }}

    - name: Copy to runtimes
      run: |
        cp ts-fsharp/${{ matrix.lib }} runtimes/${{ matrix.rid }}/native/${{ matrix.lib }}
        ls -la runtimes/${{ matrix.rid }}/native/

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: tree-sitter-fsharp-${{ matrix.rid }}
        path: runtimes/${{ matrix.rid }}/native/${{ matrix.lib }}

  # NOTE: Auto-commit is blocked by branch protection. After a successful run,
  # download artifacts with: gh run download <run-id> --dir native-artifacts
  # Then copy to runtimes/ and commit locally.
  commit-natives:
    needs: build-native
    if: always() && !cancelled()
    runs-on: ubuntu-latest

    steps:
    - name: Summary
      run: |
        echo "## Native Library Build Results" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "Download artifacts with:" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
        echo "gh run download ${{ github.run_id }} --dir native-artifacts" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "Then copy to runtimes/ and commit locally." >> $GITHUB_STEP_SUMMARY
